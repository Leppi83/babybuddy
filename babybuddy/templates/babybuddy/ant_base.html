{% load babybuddy i18n static %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>
            {% block title %}{% endblock %}
            | Baby Buddy
        </title>
        <link rel="apple-touch-icon"
              sizes="180x180"
              href="{% static "babybuddy/root/apple-touch-icon.png" %}?v=20260306" />
        <link rel="apple-touch-startup-image"
              href="{% static "babybuddy/root/apple-touch-startup-image.png" %}?v=20211218" />
        <link rel="icon"
              type="image/svg+xml"
              href="{% static "babybuddy/root/favicon.svg" %}?v=20260306" />
        <link rel="manifest"
              href="{% static "babybuddy/root/site.webmanifest" %}?v=20260306" />
        <link rel="mask-icon"
              href="{% static "babybuddy/root/safari-pinned-tab.svg" %}?v=20211218"
              color="#37abe9" />
        <link rel="shortcut icon"
              href="{% static "babybuddy/root/favicon.ico" %}?v=20260306" />
        {% block extra_head %}{% endblock %}
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-title" content="Baby Buddy" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black" />
        <meta name="application-name" content="Baby Buddy" />
        <meta name="mobile-web-app-capable" content="yes" />
        <meta name="msapplication-navbutton-color" content="#37abe9" />
        <meta name="msapplication-starturl" content="/" />
        <meta name="msapplication-TileColor" content="#37abe9" />
        <meta name="theme-color" content="#37abe9" />
        <meta name="viewport"
              content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    </head>
    <body>
        {% block page %}{% endblock %}
        {% block javascript %}{% endblock %}
        <script>
            if ('serviceWorker' in navigator) {
                window.addEventListener('load', function () {
                    navigator.serviceWorker.register('/sw.js');
                });
            }
        </script>
    </body>
</html>
