{% extends "babybuddy/base.html" %}
{% load static widget_tweaks %}
{% block breadcrumb_nav %}{% endblock %}
{% block page %}
    <div id="view-{{ request.resolver_match.view_name }}"
         class="container min-vh-100 d-flex align-items-center justify-content-center py-4"
         style="margin-left: 0; max-width: 100%; width: 100%;">
        <div class="col-12 col-md-10 col-lg-8 col-xl-7 col-xxl-6">
            <div class="text-center mb-4">
                <img src="{% static "babybuddy/logo/icon-brand.png" %}"
                     width="88"
                     height="88"
                     class="d-inline-block align-top"
                     alt="">
                <h1 class="d-none d-md-inline-block display-4 ms-3 mb-0 align-middle">
                    <span class="text-primary">Baby</span> Buddy
                </h1>
            </div>
            <div class="p-4 rounded text-light">
                {% include 'babybuddy/messages.html' %}
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>
{% endblock %}
