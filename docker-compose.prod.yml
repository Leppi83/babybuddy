services:
  babybuddy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: babybuddy
    restart: unless-stopped
    env_file:
      - ${ENV_FILE:-.env.prod}
    environment:
      - DJANGO_SETTINGS_MODULE=babybuddy.settings.base
      - TZ=${TZ:-Europe/Berlin}
      - DB_ENGINE=django.db.backends.postgresql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB:-babybuddy}
      - DB_USER=${POSTGRES_USER:-babybuddy}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
    entrypoint: ["/bin/bash", "/app/docker/entrypoint.prod.sh"]
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${BABYBUDDY_PORT:-8015}:8000"
    volumes:
      - babybuddy-media:/app/media
      - babybuddy-static:/app/static

  postgres:
    image: postgres:16-alpine
    container_name: babybuddy-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-babybuddy}
      - POSTGRES_USER=${POSTGRES_USER:-babybuddy}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-babybuddy} -d ${POSTGRES_DB:-babybuddy}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - babybuddy-pgdata:/var/lib/postgresql/data

volumes:
  babybuddy-media:
  babybuddy-static:
  babybuddy-pgdata:
