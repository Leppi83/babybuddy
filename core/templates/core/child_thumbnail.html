{% load static %}
{% if child.picture %}
    <img src="{{ child.picture.url }}"
         width="40"
         height="40"
         class="img-fluid rounded-circle"
         onerror="this.onerror=null;this.src='{% static 'babybuddy/img/core/child-placeholder.png' %}';" />
{% else %}
    <img src="{% static 'babybuddy/img/core/child-placeholder.png' %}"
         width="40"
         height="40"
         class="img-fluid rounded-circle" />
{% endif %}
